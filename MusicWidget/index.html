<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Widget</title>
  <style>
    @font-face {
      font-family: 'Galmuri9';
      src: url('./Galmuri9.ttf') format('truetype');
      font-display: swap;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Galmuri9', 'NeoDunggeunmo', 'D2Coding', 'Consolas', monospace;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #widget {
      position: relative;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    /* 중앙 디스크 박스: 위젯 가운데에 배치, 사이즈는 자식 GIF 자연 크기에 맞춤 */
    #discBox {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* GIF 는 원본 비율·크기 그대로. 위젯이 작아 넘치면 비례 축소만 적용 */
    #disc {
      display: block;
      max-width: 90vw;
      max-height: 70vh;
      width: auto;
      height: auto;
      image-rendering: pixelated;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /* 일시정지 캡처 캔버스: GIF 위에 같은 자리·같은 크기로 정확히 덮음 */
    #discFreeze {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0;
    }
    #discBox.paused #discFreeze { opacity: 1; }

    /* 텍스트는 디스크 안 하단 가운데. Galmuri9 픽셀 폰트 적용 */
    #datetime {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 14%;
      text-align: center;
      color: #ffffff;
      font-family: 'Galmuri9', monospace;
      font-size: clamp(11px, 3vmin, 18px);
      line-height: 1.55;
      letter-spacing: 0.5px;
      text-shadow:
        1px 1px 0 #000,
        -1px 1px 0 #000,
        1px -1px 0 #000,
        -1px -1px 0 #000,
        2px 2px 0 rgba(0, 0, 0, 0.55);
      pointer-events: none;
      white-space: nowrap;
      z-index: 2;
    }

    /* 컨트롤 바: 재생 ▶ → 일시정지 || 좌→우 순서. 가로폭은 JS 가 GIF 폭과 동기화 */
    #controlBar {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(28px, 12vmin, 64px);
      padding: clamp(12px, 3vmin, 20px) clamp(28px, 9vmin, 56px);
      background: #5BB143;
      border-radius: 9999px;
      box-sizing: border-box;
    }

    #controlBar button {
      position: relative;
      background: transparent;
      border: none;
      padding: 0;
      cursor: pointer;
      width: clamp(34px, 10vmin, 52px);
      height: clamp(34px, 10vmin, 52px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      transition: opacity 0.12s ease;
      flex-shrink: 0;
    }

    #controlBar button::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.85);
      box-sizing: border-box;
      pointer-events: none;
    }

    #controlBar button:hover { opacity: 0.85; }
    #controlBar button:active { opacity: 0.6; }

    #controlBar button svg {
      width: 58%;
      height: 58%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="widget">
    <div id="discBox" class="paused">
      <img id="disc" src="./disc.gif" alt="" draggable="false" />
      <canvas id="discFreeze" aria-hidden="true"></canvas>
      <div id="datetime"></div>
    </div>
    <div id="controlBar">
      <button id="playBtn" type="button" aria-label="재생">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <polygon points="8,5.5 18,12 8,18.5" fill="#FFFFFF" />
        </svg>
      </button>
      <button id="pauseBtn" type="button" aria-label="일시정지">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="7" y="6" width="3.5" height="12" rx="0.4" fill="#FFFFFF" />
          <rect x="13.5" y="6" width="3.5" height="12" rx="0.4" fill="#FFFFFF" />
        </svg>
      </button>
    </div>
  </div>

  <!-- 같은 폴더에 'disc.gif', 'music.mp3', 'Galmuri9.ttf' 를 두세요. -->
  <audio id="bgm" src="./music.mp3" preload="auto" loop></audio>

  <script>
    (() => {
      const discImg = document.getElementById('disc');
      const discFreeze = document.getElementById('discFreeze');
      const discBox = document.getElementById('discBox');
      const datetime = document.getElementById('datetime');
      const widget = document.getElementById('widget');
      const bgm = document.getElementById('bgm');
      const playBtn = document.getElementById('playBtn');
      const pauseBtn = document.getElementById('pauseBtn');
      const controlBar = document.getElementById('controlBar');

      // ---------- 컨트롤 바 가로폭을 GIF 가로폭과 동기화 ----------
      function syncControlBarWidth() {
        const w = discImg.getBoundingClientRect().width;
        if (w > 0) controlBar.style.width = w + 'px';
      }
      if (typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(syncControlBarWidth).observe(discImg);
      }
      window.addEventListener('resize', syncControlBarWidth);
      discImg.addEventListener('load', syncControlBarWidth);
      if (discImg.complete && discImg.naturalWidth > 0) syncControlBarWidth();

      // ---------- 1초마다 한국어 날짜/시간 갱신 ----------
      function updateClock() {
        const now = new Date();
        const date = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
        const time = now.toLocaleTimeString('ko-KR');
        datetime.innerHTML = `${date}<br>${time}`;
      }
      updateClock();
      setInterval(updateClock, 1000);

      // ---------- GIF 일시정지(현재 프레임 캡처) / 재개 ----------
      // GIF 본체는 항상 백그라운드 진행 중. 일시정지 시 그 순간의 프레임을
      // canvas 에 떠 GIF 위에 덮어 보여주고, 재생 시 캔버스를 숨겨
      // 백그라운드에서 진행 중이던 GIF 가 그 시점부터 자연스럽게 이어 보이게 함.
      // 원본 비율을 유지해야 하므로 표시 사이즈를 그대로 캔버스에 풀로 그림(자르기 없음).
      function captureFreezeFrame() {
        if (!discImg.complete || discImg.naturalWidth === 0) return;
        const dpr = window.devicePixelRatio || 1;
        const rect = discImg.getBoundingClientRect();
        const w = Math.max(1, Math.round(rect.width * dpr));
        const h = Math.max(1, Math.round(rect.height * dpr));
        if (discFreeze.width !== w) discFreeze.width = w;
        if (discFreeze.height !== h) discFreeze.height = h;
        const ctx = discFreeze.getContext('2d');
        ctx.clearRect(0, 0, w, h);
        try {
          ctx.drawImage(discImg, 0, 0, w, h);
        } catch (_) {}
      }

      function freezeGif() {
        captureFreezeFrame();
        discBox.classList.add('paused');
      }
      function unfreezeGif() {
        discBox.classList.remove('paused');
      }

      window.addEventListener('resize', () => {
        if (discBox.classList.contains('paused')) captureFreezeFrame();
      });

      function onGifReady() {
        if (bgm.paused) freezeGif();
      }
      if (discImg.complete && discImg.naturalWidth > 0) {
        onGifReady();
      } else {
        discImg.addEventListener('load', onGifReady);
      }

      // ---------- 자동재생 게이트 (위젯 첫 클릭 시 재생 시작) ----------
      let unlocked = false;
      function unlockAndPlay() {
        if (unlocked) return;
        unlocked = true;
        bgm.play().catch(() => {});
      }
      widget.addEventListener('click', unlockAndPlay);
      widget.addEventListener('touchstart', unlockAndPlay, { passive: true });

      // ---------- 재생 / 일시정지 버튼 ----------
      playBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        unlocked = true;
        if (bgm.paused) {
          bgm.play().catch(() => {});
        }
      });
      pauseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        unlocked = true;
        if (!bgm.paused) {
          bgm.pause();
        }
      });

      // 재생/일시정지 상태 변화에 GIF freeze/unfreeze 동기화
      bgm.addEventListener('play', () => unfreezeGif());
      bgm.addEventListener('pause', () => freezeGif());

      // 끊김 없는 무한 루프
      bgm.addEventListener('ended', () => {
        bgm.currentTime = 0;
        bgm.play().catch(() => {});
      });
    })();
  </script>
</body>
</html>
